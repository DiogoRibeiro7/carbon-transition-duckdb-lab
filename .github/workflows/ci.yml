name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
      - name: Install dependencies
        run: poetry install --with dev
      - name: Run lint
        run: poetry run ruff check .
      - name: Type check
        run: poetry run mypy src
      - name: Run tests
        run: poetry run pytest
      - name: Register Jupyter kernel
        run: poetry run python -m ipykernel install --user --name ci-kernel
      - name: Execute notebooks
        run: poetry run pytest --nbmake notebooks --nbmake-kernel=ci-kernel
      - name: Build dbt models
        run: |
          poetry run carbon-duckdb sample-data --output-dir data/raw
          poetry run dbt build --project-dir transform --profiles-dir transform
